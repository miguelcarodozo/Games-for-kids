    <title>Jogo da associação</title>
    <link rel="stylesheet" href="base.css">
    <style>
        #content {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            width: 1000px;
            padding: 20px;
            border-radius: 30px;
            animation: fadeInUp 0.8s ease;
        }

        #imgDiv {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gameImg {
            width: 500px;
            height: 315px;
            border-radius: 15px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        #optionsDiv {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .option-btn {
            border: none;
            width: 140px;
            color: white;
            border-radius: 5px;
            padding: 5px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            animation: fadeInUp 0.8s ease 0.2s both;
            background: #2f1bdfb0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-btn:hover {
            transform: scale(1.1) rotate(5deg);
            background: #ffb347;
        }
    </style>
</head>

<body>
    <h1>Jogo da associação</h1>
    <h3 id="text">Aperte o botão pra começar!</h3>
    <button id="startButton">Começar</button>
    <div id="content" style="display: none;">
        <div id="imgDiv">

        </div>

        </div>

</body>

    startBtn.onclick = function () {
        startBtn.style.display = "none";
        content.style.display = "flex";
        feedback.textContent = "Vamos lá!";
        loadQuestion();
    }

    var i = 0;

    function disableButtons() {
        const buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((btn) => {
            btn.style.pointerEvents = "none";
            setTimeout(() => {
                btn.style.pointerEvents = "auto";
            }, 2000);
        })
    }

    function checkResult(answers) {
        const buttons = document.querySelectorAll(".option-btn");
        var allDone = true;
        buttons.forEach((btn) => {
            if (answers.includes(btn.textContent) && btn.disabled == false) {
                allDone = false;
            }
        });

        if (allDone == true) {
            disableButtons();
            feedback.textContent = "Vamos pro próximo!";
            setTimeout(() => {
                i++;
                loadQuestion();
            }, 2000)
        }
    }

    function createButtons() {
        console.log(questions[i].options[0]);
        for (let j = 0; j < questions[i].options.length; j++) {
            console.log(j);
            let random = Math.floor(Math.random() * questions[i].options.length);
            let temp = questions[i].options[j];
            questions[i].options[j] = questions[i].options[random];
            questions[i].options[random] = temp;
        }

        questions[i].options.forEach((option) => {
            optionsDiv.innerHTML += `<button class="option-btn">${option}</button>`
        });

        var answers = questions[i].options.filter((option) => {
            return questions[i].answers.includes(option);
        })

        var buttons = document.querySelectorAll(".option-btn");
        buttons.forEach((btn) => {
            if (answers.includes(btn.textContent)) {
                btn.addEventListener("click", function () {
                    new Audio("../audios/correto.m4a").play();
                    btn.style.backgroundColor = "green";
                    btn.disabled = true;
                    feedback.textContent = "Continue!";
                    checkResult(answers);
                });
            } else {
                btn.addEventListener("click", function () {
                    new Audio("../audios/errado.m4a").play();
                    feedback.textContent = "Errado, tente de novo!";
                    disableButtons();
                })
            }
        })
    }

    function loadQuestion() {
        if (i < questions.length) {
            optionsDiv.innerHTML = "";
            imgDiv.innerHTML = `<img src="${questions[i].imgUrl}" class="gameImg">`;
            let options = questions[i].options;
            createButtons();
        } else {
            feedback.textContent = "Parabéns, você completou o jogo!";
            contentDiv.style.display = "none";
        }
    }
