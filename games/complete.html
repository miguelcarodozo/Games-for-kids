<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="base.css">
    <title>Completar</title>
    <style>
        #content {
            display: block;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 30px;
            margin: 20px auto;
            width: fit-content;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            justify-content: center;
            text-align: center;
            justify-content: center;
        }

        #content p {
            font-size: 4rem !important;
            letter-spacing: 5px;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px 50px;
            border-radius: 30px;
            border-bottom: 5px solid #ffd93d;
            display: inline-block;
            margin: 20px auto;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        .option {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            padding: 10px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            animation: fadeInUp 0.8s ease 0.2s both;
            background: #ffd93d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.8s ease;
        }
    </style>
</head>

<body>
    <h1>Completar</h1>
    <h3 id="feedback">
        Complete as palavras
    </h3>
    <button id="startButton">
        <img src="https://img.icons8.com/?size=100&id=9978&format=png&color=000000">
    </button>
    <div id="content">

    </div>
</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>

<script>
    const feedback = document.getElementById("feedback");
    const content = document.getElementById("content");
    const startBtn = document.getElementById("startButton");
    content.style.display = "none";

    const words = [
        "AMOR",
        "CACHORRO",
        "COMPUTADOR",
        "LIVRO",
        "FLOR",
        "CAF횋",
        "M횣SICA",
        "PRAIA",
        "MONTANHA",
        "AMIZADE",
        "SOL",
        "LUA",
        "ESTRELA",
        "TEMPO",
        "FELICIDADE",
        "SONHO",
        "VIAGEM",
        "ESCOLA",
        "FAM횒LIA",
        "NATUREZA",
        "CORPO"
    ];

    const wordsToSelect = [...words];

    let fase = 0;
    let acertos = 0;
    function buildQuestions() {
        if (fase <= 20) {
            let vogais = "AEIOU";
            let consoantes = "BCDFGHJKLMNPQRSTVWXYZ"
            let vogaisCAcento = "횁횄횂횋횎횒횓횛횚횙횣횤횉";
            content.innerHTML = "";
            let randomWord = Math.floor(Math.random() * wordsToSelect.length);
            let word = wordsToSelect[randomWord];
            wordsToSelect.splice(randomWord, 1);

            let randomLetter = Math.floor(Math.random() * word.length);
            let letter = word[randomLetter];
            let wordArr = word.split("");
            wordArr[randomLetter] = '_';
            let newWord = wordArr.join("");

            console.log(word);

            let options = [letter];

            const wordDiv = document.createElement("div");
            const optionsDiv = document.createElement("div");
            optionsDiv.style.display = "flex";
            optionsDiv.style.gap = "30px";
            optionsDiv.style.padding = "20px";
            optionsDiv.style.justifyContent = "center";

            const displayWord = document.createElement("p");
            displayWord.textContent = newWord;
            displayWord.style.fontSize = "25px";
            displayWord.style.padding = "20px";
            wordDiv.appendChild(displayWord);
            content.appendChild(wordDiv);

            while (options.length < 3) {
                let option;
                if (vogais.includes(letter)) {
                    option = vogais[Math.floor(Math.random() * vogais.length)];
                } else if (consoantes.includes(letter)) {
                    option = consoantes[Math.floor(Math.random() * consoantes.length)];
                } else {
                    option = vogaisCAcento[Math.floor(Math.random() * vogaisCAcento.length)];
                }
                if (!options.includes(option)) {
                    options.push(option);
                }
            }
            for (let i = 0; i < 3; i++) {
                let random = Math.floor(Math.random() * options.length);
                let temp = options[i];
                options[i] = options[random];
                options[random] = temp;
            }
            options.forEach(opt => {
                const button = document.createElement("button");
                button.classList.add("option");
                button.textContent = opt;

                button.onclick = function () {
                    if (this.textContent === letter) {
                        feedback.textContent = "Continue!";
                        feedback.style.color = "green";
                        acertos++;
                        displayWord.textContent = word;

                        document.querySelectorAll("#content button").forEach(btn => {
                            btn.disabled = true;
                        });
                    } else {
                        feedback.textContent = "Vamos l찼!";
                        feedback.style.color = "red";
                        this.disabled = true;
                    }
                    document.querySelectorAll(".option").forEach((opt) => {
                        if (opt.textContent == letter) {
                            opt.style.backgroundColor = "green";
                        } else {
                            opt.style.backgroundColor = "red";
                        }
                        opt.disabled = true;
                    });
                    setTimeout(() => { fase++; buildQuestions() }, 2000)
                };

                optionsDiv.appendChild(button);
            });

            content.appendChild(optionsDiv);
        } else {
            content.style.display = "none";
            feedback.textContent = `Voc챗 acertou ${acertos}!`;
            const div = document.createElement("div");
            div.style.display = "flex";
            div.style.animation = "fadeInUp 0.8s ease";
            const index = document.createElement("a");
            index.href = "../index.html";
            index.text = "Menu";
            index.classList.add("gameLink");
            index.style.marginTop = "20px";
            const again = document.createElement("a");
            again.onclick = function () { location.reload() };
            again.text = "De novo?";
            again.classList.add("gameLink");
            again.style.cursor = "pointer";
            again.style.marginTop = "20px";
            div.appendChild(index);
            div.appendChild(again);
            document.querySelector("body").appendChild(div);
        }
    }
    startBtn.onclick = function () {
        startBtn.style.display = "none";
        content.style.display = "block";
        buildQuestions();
    }
</script>

</html>
