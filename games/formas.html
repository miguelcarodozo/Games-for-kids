<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <title>Jogo para aprender</title>
    <link rel="stylesheet" href="base.css">
    <style>
        #content {
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 30px;
            margin: 20px auto;
            width: fit-content;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            justify-content: center;
            text-align: center;
            align-items: center;
        }

        #content img {
            width: 90px;
            height: auto;
        }

        button {
            padding: 14px;
            font-weight: bold;
            font-size: 2rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Perguntas</h1>
    <h3 id="feedback">Acerte as perguntas</h3>
    <button id="startButton">Começar</button>
    <div id="content" style="display: none;">
    </div>
</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>
<script>
    const feedback = document.getElementById("feedback");
    const content = document.getElementById("content");
    const startBtn = document.getElementById("startButton")
    startBtn.onclick = function () {
        startBtn.style.display = "none";
        content.style.display = "block";
        main();
    }

    const formas = ["círculo", "quadrado", "triângulo", "estrela", "lua", "retângulo", "coração", "flor", "mão", "casa"];
    const img = ["https://img.icons8.com/?size=100&id=37375&format=png&color=000000",      // círculo - preto
        "https://img.icons8.com/?size=100&id=ApnyC4pGzK23&format=png&color=333333", // quadrado - cinza escuro
        "https://img.icons8.com/?size=100&id=11788&format=png&color=2C3E50",     // triângulo - azul petróleo escuro
        "https://img.icons8.com/?size=100&id=104&format=png&color=5D3A1A",       // estrela - marrom escuro
        "https://img.icons8.com/?size=100&id=26031&format=png&color=4A4A4A",     // lua - cinza médio escuro
        "https://img.icons8.com/?size=100&id=6QZVddZNGBJo&format=png&color=1E2A3E", // retângulo - azul noite
        "https://img.icons8.com/?size=100&id=87&format=png&color=8B0000",        // coração - vermelho escuro
        "https://img.icons8.com/?size=100&id=V0zioVt6bmKv&format=png&color=4A2C2C", // flor - vinho escuro
        "https://img.icons8.com/?size=100&id=KSMw5R43ZXyz&format=png&color=5D4037", // mão - marrom café
        "https://img.icons8.com/?size=100&id=60580&format=png&color=1A1A1A"      // casa - cinza quase preto
    ]

    const forms = [
        { nome: "círculo", img: "https://img.icons8.com/?size=100&id=37375&format=png&color=FF0000" },      // vermelho vivo
        { nome: "quadrado", img: "https://img.icons8.com/?size=100&id=ApnyC4pGzK23&format=png&color=00FF00" }, // verde limão
        { nome: "triângulo", img: "https://img.icons8.com/?size=100&id=11788&format=png&color=0000FF" },    // azul puro
        { nome: "estrela", img: "https://img.icons8.com/?size=100&id=104&format=png&color=FFFF00" },       // amarelo
        { nome: "lua", img: "https://img.icons8.com/?size=100&id=26031&format=png&color=FFA500" },         // laranja
        { nome: "retângulo", img: "https://img.icons8.com/?size=100&id=6QZVddZNGBJo&format=png&color=800080" }, // roxo
        { nome: "coração", img: "https://img.icons8.com/?size=100&id=87&format=png&color=FF69B4" },        // rosa choque
        { nome: "flor", img: "https://img.icons8.com/?size=100&id=798&format=png&color=000000" },
        { nome: "mão", img: "https://img.icons8.com/?size=100&id=2727&format=png&color=000000" }, 
        { nome: "casa", img: "https://img.icons8.com/?size=100&id=60580&format=png&color=808080" }        
    ];

    let fase = 0;
    let newForms;

    function main() {
        
        content.innerHTML = "";
        if (fase <= 7) {
            newForms = [...forms];
            let randomForm = Math.floor(Math.random() * newForms.length);
            let form = newForms[randomForm];
            newForms.splice(randomForm, 1);
            forms.splice(randomForm, 1);
            let options = [form.img];
            new Audio("../audios/loading.wav").play();
            setTimeout(() => falarPalavra(form.nome), 500);


            for (let i = 0; i < 2; i++) {
                let randomOp = Math.floor(Math.random() * newForms.length);
                options.push(newForms[randomOp].img);
                newForms.splice(randomOp, 1);
            }

            for (let i = 0; i < 2; i++) {
                let random = Math.floor(Math.random() * 3);
                let temp = options[i];
                options[i] = options[random];
                options[random] = temp;
            }

            content.style.justifyContent = "center";
            const soundBtn = document.createElement("button");
            const img = document.createElement("img");

            img.src = "../siteImages/volume.png";
            soundBtn.appendChild(img);
            soundBtn.onclick = function () {
                falarPalavra(form.nome);
            }
            content.appendChild(soundBtn);

            const optionsDiv = document.createElement("div");
            optionsDiv.style.padding = "20px";
            optionsDiv.style.display = "flex";
            optionsDiv.style.gap = "15px";
            options.forEach((op) => {
                const opImg = document.createElement("img");
                opImg.style.padding = "15px";
                opImg.style.backgroundColor = "white";
                opImg.style.borderRadius = "25px";
                opImg.src = op;
                opImg.style.animation = "fadeInUp 0.8s ease";
                optionsDiv.appendChild(opImg);
                opImg.onclick = function () {
                    checkResult(opImg, op, form.img);
                }

            })
            content.appendChild(optionsDiv);
        } else {
            new Audio("../audios/win.wav").play();
            final();
        }
    }

    function checkResult(opImg, option, ans) {
        opImg.style.pointerEvents = "none";
        if (option == ans) {
            new Audio("../audios/correto.m4a").play();
            fase++;
            feedback.textContent = "Certo!";
            feedback.style.color = "green";
            opImg.style.backgroundColor = "green";
            setTimeout(() => {
                feedback.textContent = "Vamos lá!";
                feedback.style.color = "#ffd93d";
                main();
            }, 2000)
        } else {
            new Audio("../audios/errado.m4a").play();
            feedback.textContent = "Errado!";
            feedback.style.color = "red";
            opImg.style.backgroundColor = "red";
            opImg.style.pointerEvents = "auto";
            setTimeout(() => {
                opImg.style.backgroundColor = "white";
                feedback.textContent = "Vamos tentar de novo!";
                feedback.style.color = "#ffd93d";
            }, 2000)
        }
    }

    function final() {
        content.style.display = "none";
        const div = document.createElement("div");
        div.id = "final"
        div.style.display = "flex";
        const index = document.createElement("a");
        index.href = "../index.html";
        index.text = "Menu";
        index.classList.add("gameLink");
        index.style.marginTop = "20px";
        const again = document.createElement("a");
        again.style.cursor = "pointer";
        again.text = "De novo?";
        again.classList.add("gameLink");
        div.style.animation = "fadeInUp 0.8s ease";
        again.style.marginTop = "20px";
        div.appendChild(index);
        div.appendChild(again);
        document.querySelector("body").appendChild(div);
        again.onclick = function () { location.reload() };
    }

    function falarPalavra(palavra, idioma = 'pt-BR') {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(palavra);

            utterance.lang = idioma;
            utterance.rate = 0.5;
            utterance.pitch = 1.0;
            utterance.volume = 1;

            utterance.onstart = () => console.log(`Falando: ${palavra}`);
            utterance.onend = () => console.log('Fala finalizada');
            utterance.onerror = (event) => console.error('Erro na fala:', event);

            window.speechSynthesis.speak(utterance);
        } else {
            console.error('Seu navegador não suporta a API de síntese de voz');
            alert('Seu navegador não suporta a reprodução de voz');
        }
    }
</script>

</html>
