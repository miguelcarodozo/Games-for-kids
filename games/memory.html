<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <link rel="stylesheet" href="base.css">
    <style>
        #content {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
            margin: 0 auto;
        }

        .card {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            aspect-ratio: 1;
            border: none;
            padding: 8px;
        }

        .card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            display: block;
        }

        .unflipped {
            background: #ffd93d;
        }

        .unflipped img {
            display: none;
        }

        .unflipped p {
            display: block;
            font-size: 3rem;
            margin: 0;
            color: white;
        }


        .flipped {
            pointer-events: none;
        }

        .flipped img {
            display: block;
        }

        .flipped p {
            display: none;
        }

        .hit {
            pointer-events: none;
            opacity: 0.8;
        }

        .hit img {
            display: block;

        }

        .hit p {
            display: none;
        }

        .desabilitado {
            pointer-events: none;
        }

        .gameLink {
            color: #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            justify-content: center;
            background: #ffffff;
            padding: 20px 10px;
            border-radius: 10px;
            margin: 10px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
        }

        /* Animações */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .hit {
            animation: pulse 0.5s ease;
        }
    </style>
</head>

<body>
    <h1>Memory Game</h1>
    <h3 id="feedback">Aperte o botão pra começar</h3>
    <button id="startButton">Começar</button>
    <div id="content"></div>
</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>
<script>
    const feedback = document.getElementById('feedback');
    const content = document.getElementById('content');
    const startButton = document.getElementById('startButton');

    const cards = [
        ["../siteImages/memoria/raio.png",
            "../siteImages/memoria/urso.png"],
        ["../siteImages/memoria/pen.png",
            "../siteImages/memoria/heart.png"]
        ,
        ["../siteImages/memoria/cloud.png",
            "../siteImages/memoria/bola.png"],
        ["../siteImages/memoria/fries.png",
            "../siteImages/memoria/refri.png"]
    ];

    let cardsToAdd;

    let i = 0;
    let touches = 0;

    function final() {
        content.style.display = "none";
        feedback.textContent = "Parabéns, você terminou!";
        const index = document.createElement("a");
        index.href = "../index.html";
        index.text = "Menu";
        index.classList.add("gameLink");
        document.querySelector("body").appendChild(index);
        const game = document.createElement("a");
        game.href = "";
        game.onclick = function () { location.reload() };
        again.style.cursor = "pointer";
        game.textContent = "De novo?";
        game.classList.add("gameLink");
        document.querySelector("body").appendChild(game);
        body.style.display = "flex";
    }

    function disableButtons() {
        const cards = document.querySelectorAll(".unflipped");
        cards.forEach((card) => {
            card.style.pointerEvents = "none";
        })
    }

    function enableButtons() {
        const cards = document.querySelectorAll(".unflipped");
        cards.forEach((card) => {
            card.style.pointerEvents = "auto";
        })
    }

    function checkResult() {
        disableButtons();
        const flipped = document.querySelectorAll(".flipped");
        let sources = [];
        flipped.forEach((card) => {
            const img = card.querySelector(".cardImg");
            if (!sources.includes(img.src)) {
                sources.push(img.src);
            }
        });

        touches = 0;
        if (sources.length == 1) {
            flipped.forEach((card) => {
                card.classList.remove("flipped");
                card.classList.add("hit");
                new Audio("../audios/correto.m4a").play();
                const totalCards = cardsToAdd.length * 2;
                const hitCards = document.querySelectorAll(".hit").length;
                enableButtons();
                if (hitCards == totalCards) {
                    i++;
                    setTimeout(() => {
                        build();
                    }, 2000)
                }
            })
        } else {
            new Audio("../audios/errado.m4a");
            flipped.forEach((card) => {
                setTimeout(() => {
                    card.classList.remove("flipped");
                    card.classList.add("unflipped");
                    enableButtons();
                }, 1000);

            });
        }
        const cards = document.querySelectorAll(".card");
        setTimeout(() => {
            cards.forEach((card) => {
                card.style.pointerEvents = "auto";
            })
        }, 2000);
    }

    function createCards() {
        let newCards = [...cardsToAdd];
        newCards.push(...cardsToAdd);
        for (let k = 0; k < cardsToAdd.length * 2; k++) {
            let random = Math.floor(Math.random() * newCards.length);
            let card = newCards[random];
            newCards.splice(random, 1);
            content.innerHTML += `
                    <button class="unflipped card">
                        <img src="${card}" alt="card" class="cardImg">
                        <p>?</p>
                    </button>`;
            if (i == (cards.length - 1)) {
                content.style.gridTemplateColumns = "repeat(8, 1fr)"
            }
        }
    }

    function build() {
        if (i <= cards.length - 1) {
            let j = i;
            cardsToAdd = [];
            content.innerHTML = "";

            while (j >= 0) {
                cards[j].forEach((card) => {
                    cardsToAdd.push(card);
                })
                j--;
            }

            createCards();

            const cardElements = document.querySelectorAll(".unflipped");

            cardElements.forEach(card => {
                card.onclick = function () {
                    if (card.classList.contains("hit") || card.classList.contains("flipped")) {
                        return;
                    }
                    touches++;
                    card.style.pointerEvents = "none";
                    card.classList.remove("unflipped");
                    card.classList.add("flipped");
                    if (touches == 2) {
                        checkResult();
                    }
                }
            });

        } else {
            final();
        }
    }

    startButton.onclick = function () {
        startButton.style.display = "none";
        feedback.text = "Vamos lá!"
        content.style.display = "grid";
        build();
    }


</script>

</html>
