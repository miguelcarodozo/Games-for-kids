<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="base.css">
    <style>
        #content {
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 30px;
            margin: 20px auto;
            width: fit-content;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            justify-content: center;
            text-align: center;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 0.8s ease;
        }

        #content p {
            font-size: 5rem;
            color: white;
            font-weight: bold;
            min-width: 80px;
            text-align: center;
        }

        #main {
            font-size: 4rem !important;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 30px 50px;
            border-radius: 30px;
            border-bottom: 5px solid #ffd93d;
            display: inline-block;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        #operator {
            color: #ffd93d;
            font-size: 5.5rem;
        }

        #options {
            display: flex;
            justify-content: center;
            padding: 10px;
            gap: 20px;
            margin: 10px 0;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .ansOption {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            background: #ffd93d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ansOption:hover {
            transform: scale(1.2) 0.8s ease;
            background: linear-gradient(145deg, #ffb347, #ff8c42);
        }

        .ansOption:active {
            transform: scale(0.95);
        }

        .ansOption:disabled {
            pointer-events: none;
        }

        #feedback {
            margin-top: 15px;
            text-align: center;
        }

        .gameLink {
            color: #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            justify-content: center;
            background: #ffffff;
            padding: 20px 10px;
            border-radius: 10px;
            margin: 10px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <h1>Lógica matemática</h1>
    <h3 id="feedback">Acerte as contas</h3>
    <button id="startButton">Começar</button>
    <div id="content" style="display: none;">
        <div id="main" style="display: flex; justify-content: center;">
            <p id="num1"></p>
            <p id="operator"></p>
            <p id="num2"></p>
        </div>
        <div id="options">
        </div>
    </div>
</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>
<script>
    const startBtn = document.getElementById("startButton");
    const content = document.getElementById("content");
    const num1E = document.getElementById("num1");
    const num2E = document.getElementById("num2");
    const operatorE = document.getElementById("operator")
    const options = document.getElementById("options");
    const feedback = document.getElementById("feedback");

    let opArr = ["add", "sub"];
    let fase;
    let correctAns;
    let ans;

    function start() {
        content.style.display = "block";
        options.innerHTML = "";
        let num1 = Math.floor(Math.random() * 20);
        let num2 = Math.floor(Math.random() * 20);

        let typeOfAns = [];

        let operator = opArr[Math.floor(Math.random() * (opArr.length))];
        console.log(operator);
        if (operator === "add") {
            ans = num1 + num2;
            num1E.textContent = num1;
            num2E.textContent = num2;
            operatorE.textContent = '+';
            typeOfAns = [
                [ans, ans + 1, ans + 2],
                [ans, ans + 2, ans + 1],
                [ans + 1, ans, ans + 2],
                [ans + 2, ans, ans + 1],
                [ans + 1, ans + 2, ans],
                [ans + 2, ans + 1, ans],
                [ans, ans - 1, ans - 2],
                [ans, ans - 2, ans - 1],
                [ans - 1, ans, ans - 2],
                [ans - 2, ans, ans - 1],
                [ans - 1, ans - 2, ans],
                [ans - 2, ans - 1, ans],
                [ans, ans + 3, ans - 1],
                [ans, ans - 1, ans + 3],
                [ans + 3, ans, ans - 1],
                [ans - 1, ans, ans + 3],
                [ans + 3, ans - 1, ans],
                [ans - 1, ans + 3, ans]
            ];
        } else {
            ans = Math.abs(num1 - num2);
            num1E.textContent = Math.max(num1, num2);
            num2E.textContent = Math.min(num1, num2);
            operatorE.textContent = '-';
            typeOfAns = [
                [ans, ans + 1, ans + 2],
                [ans, ans + 2, ans + 1],
                [ans + 1, ans, ans + 2],
                [ans + 2, ans, ans + 1],
                [ans + 1, ans + 2, ans],
                [ans + 2, ans + 1, ans],
            ];

        }

        let ansOp = typeOfAns[Math.floor(Math.random() * (typeOfAns.length - 1))];
        ansOp.forEach((op) => {
            const option = document.createElement("button");
            option.classList.add("ansOption");
            option.textContent = op;
            options.appendChild(option);
            option.onclick = function () {
                if (option.textContent == ans) {
                    new Audio("../audios/correto.m4a").play();
                    correctAns++;
                } else {
                    feedback.textContent = `A resposta certa era ${ans}!`
                    new Audio("../audios/errado.m4a").play();

                }
                document.querySelectorAll(".ansOption").forEach((opt) => {
                    if (opt.textContent == ans) {
                        opt.style.backgroundColor = "green";
                    } else {
                        opt.style.backgroundColor = "red";
                    }
                    opt.disabled = true;
                });
                fase++;
                setTimeout(() => {

                    checkFase();
                    feedback.textContent = correctAns > 1 ? `${correctAns} acertos!` : `Continue!`;
                }, 2000)
            }
        })
    }

    function checkFase() {
        if (fase <= 3) {
            start()
        } else {
            feedback.textContent = `Terminou! ${correctAns} acertos!`;
            final();
        }
    }


    startBtn.onclick = function () {
        startBtn.style.display = 'none';
        fase = 0;
        correctAns = 0;
        start();
    }

    function final() {
        content.style.display = "none";
        const div = document.createElement("div");
        div.style.display = "flex";
        const index = document.createElement("a");
        index.href = "../index.html";
        index.text = "Menu";
        index.classList.add("gameLink");
        index.style.marginTop = "20px";
        const again = document.createElement("a");
        again.onclick = function () { location.reload() };
        again.text = "De novo?";
        again.style.cursor = "pointer";
        again.classList.add("gameLink");
        again.style.marginTop = "20px";
        div.appendChild(index);
        div.appendChild(again);
        document.querySelector("body").appendChild(div);
    }
</script>

</html>
