<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #667eea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 4rem;
        }

        h1 {
            font-size: 4rem;
            text-align: center;
            color: white;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease;
        }

        h3 {
            font-size: 1.8rem;
            text-align: center;
            color: #ffd93d;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease 0.1s both;
        }

        #games{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        a {
            text-decoration: none;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        footer {
            display: flex;
            gap: 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            color: white;
            text-align: center;
            justify-content: end;
            padding: 15px;
            font-weight: bolder;
        }

        .game {
            background: #ffffff;
            padding: 20px 10px;
            border-radius: 10px;
            margin: 10px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gameLink {
            color: #667eea;
            font-size: 1.5rem;
            font-weight: bold;
            justify-content: center;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow: 0 15px 25px rgba(255, 255, 255, 0.3);
            }

            100% {
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            }

            50% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 2px 2px 0 rgba(0, 0, 0, 0.3);
            }
        }
    </style>
    <title>Games-for-Kids</title>
</head>

<body>
    <h1>Bem-vindo à Games-for-Kids!</h1>
    <h3>Escolha um jogo para jogar:</h3>
    <div id="games">

    </div>
</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>
<script>
    const gameDiv = document.getElementById("games");
    const games = [
        { name: "Aprendendo as letras", url: "letras.html" },
        { name: "Associe", url: "association.html" },
        { name: "Jogo da memória", url: "memory.html" },
        { name: "Matemática", url: "mat.html" },
        { name: "Tabuada", url: "tabuada.html"},
        { name: "Completar", url: "complete.html"},
        { name: "Forca", url: "forca.html"}
    ];


    games.forEach((game) => {
        gameDiv.innerHTML += `
        <div class="game">
            <a href="./games/${game.url}" class="gameLink">${game.name}</a>
        </div>
                `
    })


</script>

</html>
