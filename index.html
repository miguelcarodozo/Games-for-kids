<!DOCTYPE html>
<html>

<head>
    <title>Letras</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #667eea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-bottom: 70px;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            color: white;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease;
        }

        h3 {
            font-size: 1.8rem;
            text-align: center;
            color: #ffd93d;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease 0.1s both;
        }

        #main {
            display: flex;
            gap: 20px;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: rgb(94, 41, 119);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            animation: fadeInUp 0.8s ease;
        }

        button {
            padding: 20px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .hidden {
            display: none;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.8;
            cursor: default;
            background: black !important;
            color: white;
        }

        button:disabled:hover {
            transform: scale(0.95);
        }

        .a {
            background: #ff9999;

        }

        .b {

            color: white;
        }

            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            color: white;
            text-align: center;
            justify-content: end;
            padding: 15px;
            font-weight: bolder;
        }


        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            }

            50% {

            }

            100% {

            }
        }

        @keyframes glow {

            0%,

            }

            50% {

        @media (max-width: 600px) {

            }

                padding: 15px;

                padding: 15px;
            }

            #text {

                padding: 10px 20px;

</head>

                }
            }
        })
    })

    const buttonX = document.querySelectorAll(".x");
    buttonX.forEach(button => {
        button.addEventListener('click', function () {
            new Audio("audioX.m4a").play();
            if (totalWLeft == 0) {
                totalXLeft--;
                button.disabled = true;
                if (totalXLeft == 0) {
                    letraAtual = 'Y';
                    goal.textContent = "Próxima letra";
                    playWithDelay();
                }
            }
        })
    })

    const buttonY = document.querySelectorAll(".y");
    buttonY.forEach(button => {
        button.addEventListener('click', function () {
            new Audio("audioY.m4a").play();
            if (totalXLeft == 0) {
                totalYLeft--;
                button.disabled = true;
                goal.textContent = "Continue";
                if (totalYLeft == 0) {
                    letraAtual = 'Z';
                    goal.textContent = "Próxima letra";
                    playWithDelay();
                }
            }
        })
    })

    const buttonZ = document.querySelectorAll(".z");
    buttonZ.forEach(button => {
        button.addEventListener('click', function () {
            new Audio("audioZ.m4a").play();
            if (totalYLeft == 0) {
                totalZLeft--;
                button.disabled = true;
                goal.textContent = "Continue";
                if (totalZLeft == 0) {
                    goal.textContent = "Parabéns, terminou todas as letras!";
                }
            }

        })
    })
