<!DOCTYPE html>
<html>

<head>
    <title>Letras</title>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #667eea;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 4rem;
        }

        h1 {
            font-size: 4rem;
            text-align: center;
            color: white;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease;
        }

        h3 {
            font-size: 1.8rem;
            text-align: center;
            color: #ffd93d;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease 0.1s both;
        }

        #main {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin: 1rem auto;
        }

        .content {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 600px;
            padding: 20px;
            background: rgb(94, 41, 119);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            animation: fadeInUp 0.8s ease;
        }

        button {
            padding: 14px;
            font-size: 2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;

        }

        button:hover {
            transform: scale(1.05) translateY(-5px);
        }

        .hidden {
            display: none;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.8;
            cursor: default;
            background: white !important;
            color: black;
        }

        button:disabled:hover {
            transform: scale(0.95);
        }

        .desabilitado {
            pointer-events: none;
        }

        .a {
            background: #ff9999;
            color: white;
        }

        .b {
            background: #99ff99;
            color: white;
        }

        .c {
            background: #9999ff;
            color: white;
        }

        .d {
            background: #ffd93d;
            color: white;
        }

        .e {
            background: #d1ff04;
            color: white;
        }

        .f {
            background: #99ff99;
            color: white;
        }

        .g {
            background: #c0f04f;
            color: white;
        }

        .h {
            background: #f5d96c;
            color: white;
        }

        .i {
            background: #9e9056;
            color: white;
        }

        .j {
            background: #72ff72;
            color: white;
        }

        .k {
            background: #42ffa1;
            color: white;
        }

        .l {
            background: #fa0808;
            color: white;
        }

        .m {
            background: #ff8c42;
            color: white;
        }

        .n {
            background: #ffb347;
            color: white;
        }

        .o {
            background: #ffd93d;
            color: white;
        }

        .p {
            background: #fcff4e;
            color: white;
        }

        .q {
            background: #f09927;
            color: white;
        }

        .r {
            background: #f83f3c88;
            color: white;
        }

        .s {
            background: #ff6b6b;
            color: white;
        }

        .t {
            background: #ff8c42;
            color: white;
        }

        .u {
            background: #ffb347;
            color: white;
        }

        .v {
            background: #ffd93d;
            color: white;
        }

        .w {
            background: #a0d6b4;
            color: white;
        }

        .x {
            background: #b19cd9;
            color: white;
        }

        .y {
            background: #f7cac9;
            color: white;
        }

        .z {
            background: #9e9056;
            color: white;
        }

        footer {
            display: flex;
            gap: 20px;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000000;
            color: white;
            text-align: center;
            justify-content: end;
            padding: 15px;
            font-weight: bolder;
        }

        #playLetter {
            width: 70px;
            height: 70px;
            background-color: white;
            padding: 0;
        }


        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            }

            50% {
                box-shadow: 0 15px 25px rgba(255, 255, 255, 0.3);
            }

            100% {
                box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            }
        }

        @keyframes glow {

            0%,
            100% {
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            }

            50% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 2px 2px 0 rgba(0, 0, 0, 0.3);
            }
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            h3 {
                font-size: 1.4rem;
            }

            #content {
                gap: 10px;
                padding: 15px;
            }

            button {
                font-size: 1.5rem;
                padding: 15px;
            }

            #text {
                font-size: 1.5rem;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>
    <h1>Aprendendo as letras</h1>
    <h3 id="goal">Aperte o botão para começar!</h3>
    <div id="main">
        <button id="startBtn">Começar</button>
        <div id="fase1" class="hidden">
        </div>
        <div id="fase2" class="hidden">
        </div>
        <div id="fase3" class="hidden">
        </div>
        <div id="fase4" class="hidden">
        </div>
        <button id="playLetter" type="click" class="hidden diff">
            <img width="20" height="20" src="https://img.icons8.com/ios/50/high-volume--v1.png" alt="high-volume--v1" />
        </button>
    </div>

</body>
<footer>
    <p>@ Miguel Cardozo - 2026</p>
    <a href="https://www.linkedin.com/in/miguelcardozo-">
        <img src="https://img.icons8.com/?size=100&id=102748&format=png&color=FFFFFF" width="20px">
    </a>
    <a href="https://github.com/miguelcarodozo">
        <img src="https://img.icons8.com/?size=100&id=12599&format=png&color=FFFFFF" width="20px">
    </a>
</footer>
<script>
    var fase1 = document.getElementById("fase1");
    var fase2 = document.getElementById("fase2");
    var fase3 = document.getElementById("fase3");
    var fase4 = document.getElementById("fase4");

    var goal = document.getElementById("goal");
    var playLetter = document.getElementById("playLetter");
    var letraAtual = "A";

    const startBtn = document.getElementById("startBtn");

    var group1 = [
        { name: "a", count: 0 },
        { name: "b", count: 0 },
        { name: "c", count: 0 },
        { name: "d", count: 0 }
    ];

    var group2 = [
        { name: "f", count: 0 },
        { name: "h", count: 0 },
        { name: "e", count: 0 },
        { name: "g", count: 0 },
        { name: "i", count: 0 },
        { name: "k", count: 0 },
        { name: "j", count: 0 }
    ];

    var group3 = [
        { name: "l", count: 0 },
        { name: "m", count: 0 },
        { name: "n", count: 0 },
        { name: "o", count: 0 },
        { name: "p", count: 0 },
        { name: "q", count: 0 },
        { name: "r", count: 0 }
    ];

    var group4 = [
        { name: "s", count: 0 },
        { name: "t", count: 0 },
        { name: "u", count: 0 },
        { name: "v", count: 0 },
        { name: "w", count: 0 },
        { name: "x", count: 0 },
        { name: "y", count: 0 },
        { name: "z", count: 0 }
    ];

    function playAuto() {
        new Audio("audio" + letraAtual + ".m4a").play().catch(error => {
            console.log("Áudio não pôde ser reproduzido automaticamente:", error);
            goal.textContent = "Clique no botão de som para ouvir";
        });
    }

    function playWithDelay() {
        setTimeout(() => {
            var audio = new Audio("audio" + letraAtual + ".m4a");
            audio.load();
            audio.play().catch(e => console.log("Erro ao reproduzir:", e));
        }, 2000);
    }

    function createGroups(group, fase) {
        for (let i = 0; i < 20; i++) {
            let random = Math.floor(Math.random() * group.length);
            fase.innerHTML += `<button class="${group[random].name}">${group[random].name.toUpperCase()}</button>`;
            group[random].count++;
        }
    }

    createGroups(group1, fase1);
    createGroups(group2, fase2);
    createGroups(group3, fase3);
    createGroups(group4, fase4);

    var groups = [group1, group2, group3, group4];
    var quants = [];
    var letters = [];

    groups.forEach(group => {
        group.forEach(letter => {
            quants.push(letter.count);
            letters.push(letter.name);
        })
    })

    letters.forEach((letter, index) => {
        var buttons = document.querySelectorAll("." + letter);
        buttons.forEach((button) => {
            button.addEventListener('click', function () {
                if (index == 0 || quants[index - 1] == 0) {
                    new Audio("correto.m4a").play().catch(e => console.log("Erro ao reproduzir:", e));
                    button.disabled = true;
                    button.textContent = "";
                    button.innerHTML = `<img width="15px" height="15px" src="https://img.icons8.com/?size=100&id=3061&format=png&color=000000" alt="checked--v1"/>`;
                    quants[index]--;
                    goal.textContent = "Continue!";
                    if (quants[index] == 0) {
                        letraAtual = letters[index + 1];
                        playWithDelay();
                        disableButtonsTemporarily();
                        if (letraAtual == "f") {
                            fase1.classList.remove("content");
                            fase1.classList.add("hidden");
                            fase2.classList.remove("hidden");
                            fase2.classList.add("content");
                            goal.textContent = "Ótimo! Agora encontre as próximas letras!";
                        }else if (letraAtual == "l") {
                            fase2.classList.remove("content");
                            fase2.classList.add("hidden");
                            fase3.classList.remove("hidden");
                            fase3.classList.add("content");
                            goal.textContent = "Muito bem! Agora encontre as próximas letras!";
                        } else if (letraAtual == "s") {
                            fase3.classList.remove("content");
                            fase3.classList.add("hidden");
                            fase4.classList.remove("hidden");
                            fase4.classList.add("content");
                            goal.textContent = "Excelente! Agora encontre as últimas letras!";
                        } else if (index == letters.length - 1) {
                            fase4.classList.remove("content");
                            fase4.classList.add("hidden");
                            playLetter.classList.add("hidden");
                            goal.textContent = "Parabéns! Você encontrou todas as letras!";
                        }   else{
                            goal.textContent = "Próxima letra!";
                        }

                    }
                } else {
                    goal.textContent = "Escute o som novamente!";
                    new Audio("errado.m4a").play().catch(e => console.log("Erro ao reproduzir:", e));
                }
            })

        })
    })

    var buttons = document.querySelectorAll("button");
    function disableButtonsTemporarily() {
        buttons.forEach(button => {
            button.classList.add("desabilitado");
            setTimeout(() => {
                button.classList.remove("desabilitado");
            }, 2000);
        })
    }

    playLetter.onclick = function () {
        playAuto();
        disableButtonsTemporarily();
    }

    startBtn.onclick = function () {
        startBtn.style.display = "none";
        fase1.classList.remove("hidden");
        fase1.classList.add("content");
        playLetter.classList.remove("hidden");
        goal.textContent = "Ache todas as letras que fazem esse som!";
        playWithDelay();
        disableButtonsTemporarily();
    }

</script>

</html>
