<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <title>Jogo para aprender</title>
    <style>
      * {
        margin: 0;
      }

      body {
        font-family: "Courier New", Courier, monospace;
      }

      h1 {
        font-size: 100px;
        text-align: center;
        margin: 30px;
      }

      .boxes {
        border: 2px black solid;
        padding: 10px;
        font-size: 60px;
      }

      .habilitado {
        border: 2px rgb(0, 0, 0) solid;
        background-color: lightskyblue;
        border-radius: 90%;
        font-weight: normal;
        padding: 20px;
        font-size: 80px;
      }

      .desabilitado {
        border: 2px lightskyblue solid;
        border-radius: 90%;
        font-weight: normal;
        padding: 20px;
        font-size: 80px;
      }

      #results {
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      #numbers {
        text-align: center;
        justify-content: center;
        padding: 20px;
      }

      #feedback {
        padding: 10px;
        text-align: center;
        font-size: 35px;
      }

      #blocks {
        width: 400px;
        height: auto;
      }
    </style>
  </head>
  <body>
    <h1>Lógica matemática</h1>
    <div id="results">
      <div class="boxes" id="box1">?</div>
      <div class="boxes" id="box2">?</div>
      <div class="boxes" id="box3">?</div>
      <div class="boxes" id="box4">?</div>
      <div class="boxes" id="box5">?</div>
    </div>
    <div id="numbers">
      <button type="button" class="habilitado" id="number1">3</button>
      <button type="button" class="habilitado" id="number2">1</button>
      <button type="button" class="habilitado" id="number3">2</button>
      <button type="button" class="habilitado" id="number4">4</button>
      <button type="button" class="habilitado" id="number5">5</button>
    </div>
    <div id="feedback"></div>
  </body>
  <script>
    var counter = 1;

    var conditionFor1 = true;
    var conditionFor2 = true;
    var conditionFor3 = true;
    var conditionFor4 = true;
    var conditionFor5 = true;

    function phase2() {
      document.getElementById("feedback").innerHTML +=
        "Par <button id='fase2' type='click'> Próximo </button>";

      document.getElementById("fase2").onclick = function () {
        document.getElementById("content").innerHTML = `
                <div id="image2">
                    <img id= "blocks" src="https://carrefourbr.vtexassets.com/arquivos/ids/132929008/9b0a3c51165a47e286e3c0ea840bcb5a.jpg?v=638334528329530000"></img>
                </div>
                <div id='options'>
                    <label>
                        <input type="checkbox" name="options" value="7"> 7
                    </label>
                    <label>
                        <input type="checkbox" name="options" value="9"> 9
                    **</label>
                    <label>
                        <input type="checkbox" name="options" value="6"> 6
                    </label>
                    <label>
                        <input type="checkbox" name="options" value="8"> 8
                    </label>
                </div>
                `;
        document.getElementById("feedback").textContent = "";
      };
      document.getElementById("content").classList.add("fase2");
    }

    function checkResult() {
      var pos1 = document.getElementById("box1").textContent;
      var pos2 = document.getElementById("box2").textContent;
      var pos3 = document.getElementById("box3").textContent;
      var pos4 = document.getElementById("box4").textContent;
      var pos5 = document.getElementById("box5").textContent;

      if (pos1 < pos2 && pos2 < pos3 && pos3 < pos4 && pos4 < pos5) {
        phase2();
      } else {
        restart();
      }
    }

    function fullAttempt() {
      if (
        conditionFor1 == true ||
        conditionFor2 == true ||
        conditionFor3 == true ||
        conditionFor4 == true ||
        conditionFor5 == true
      ) {
      } else {
        checkResult();
      }
    }

    function restart() {
      // Reset das boxes
      var boxes = document.querySelectorAll(".boxes");
      boxes.forEach((box) => {
        box.textContent = "?";
      });

      // Reset dos botões
      var botoes = document.querySelectorAll("#numbers button");
      botoes.forEach((botao) => {
        botao.classList.remove("desabilitado");
        botao.classList.add("habilitado");
      });

      conditionFor1 = true;
      conditionFor2 = true;
      conditionFor3 = true;
      conditionFor4 = true;
      conditionFor5 = true;

      counter = 1;
    }

    document.getElementById("number5").onclick = function () {
      if (conditionFor5) {
        document.getElementById("box" + counter).textContent =
          document.getElementById("number5").textContent;
        counter++;
        conditionFor5 = false;
        this.classList.add("desabilitado");
        this.classList.remove("habilitado");

        fullAttempt();
      }
    };
    document.getElementById("number4").onclick = function () {
      if (conditionFor4) {
        document.getElementById("box" + counter).textContent =
          document.getElementById("number4").textContent;
        counter++;
        conditionFor4 = false;
        this.classList.add("desabilitado");
        this.classList.remove("habilitado");

        fullAttempt();
      }
    };
    document.getElementById("number3").onclick = function () {
      if (conditionFor3) {
        document.getElementById("box" + counter).textContent =
          document.getElementById("number3").textContent;
        counter++;
        conditionFor3 = false;
        this.classList.add("desabilitado");
        this.classList.remove("habilitado");
        fullAttempt();
      }
    };
    document.getElementById("number2").onclick = function () {
      if (conditionFor2) {
        document.getElementById("box" + counter).textContent =
          document.getElementById("number2").textContent;
        counter++;
        conditionFor2 = false;
        this.classList.add("desabilitado");
        this.classList.remove("habilitado");

        fullAttempt();
      }
    };
    document.getElementById("number1").onclick = function () {
      if (conditionFor1) {
        document.getElementById("box" + counter).textContent =
          document.getElementById("number1").textContent;
        counter++;
        conditionFor1 = false;
        this.classList.add("desabilitado");
        this.classList.remove("habilitado");

        fullAttempt();
      }
    };
  </script>
</html>
