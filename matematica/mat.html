<!DOCTYPE html>
<html>

<head>
    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            text-align: center;
            margin: 10px 0;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            font-weight: 700;
            letter-spacing: 2px;
            animation: fadeInDown 0.8s ease;
        }

        #content {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 25px 40px;
            margin: 15px 0;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        #content p {
            font-size: 5rem;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
            font-weight: bold;
            min-width: 80px;
            text-align: center;
        }

        #operator {
            color: #ffd93d;
            font-size: 5.5rem;
        }

        #options {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .answer {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 50%;
            font-size: 2.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(145deg, #ffd93d, #ffb347);
            color: white;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.2);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .answer:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
            background: linear-gradient(145deg, #ffb347, #ff8c42);
        }

        .answer:active {
            transform: scale(0.95);
        }

        .answer:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(0.95);
            background: linear-gradient(145deg, #c0c0c0, #a0a0a0);
        }

        .answer:disabled:hover {
            transform: scale(0.95);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        #feedback {
            margin-top: 15px;
            text-align: center;
        }

        #text {
            font-size: 2.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            min-height: 60px;
            animation: glow 2s ease-in-out infinite;
            padding: 10px;
        }

        /* Animações */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 2px 2px 0 rgba(0, 0, 0, 0.3);
            }
        }

        /* Responsividade para telas menores */
        @media (max-height: 700px) {
            h1 {
                font-size: 2.5rem;
                margin: 5px 0;
            }

            #content p {
                font-size: 4rem;
            }

            #operator {
                font-size: 4.5rem;
            }

            .answer {
                width: 100px;
                height: 100px;
                font-size: 2.3rem;
            }

            #text {
                font-size: 1.8rem;
                min-height: 50px;
            }
        }

        @media (max-height: 600px) {
            h1 {
                font-size: 2rem;
            }

            #content {
                padding: 15px 30px;
            }

            #content p {
                font-size: 3rem;
            }

            #operator {
                font-size: 3.5rem;
            }

            .answer {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }

            #text {
                font-size: 1.5rem;
                min-height: 40px;
            }
        }

        /* Modo paisagem */
        @media (max-width: 800px) and (orientation: landscape) {
            body {
                padding: 5px;
            }

            h1 {
                font-size: 2rem;
                margin: 2px 0;
            }

            #content {
                padding: 10px 25px;
                margin: 5px 0;
            }

            #content p {
                font-size: 2.8rem;
            }

            .answer {
                width: 70px;
                height: 70px;
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <h1>Lógica matemática</h1>
    <div id="content">
        <p id="firstNumber">6</p>
        <p id="operator">+</p>
        <p id="secondNumber">5</p>
        <p>=</p>
        <p id="result">?</p>
    </div>
    <div id="options">
        <button id="firstOption" type="button" class="answer"></button>
        <button id="secondOption" type="button" class="answer"></button>
        <button id="thirdOption" type="button" class="answer"></button>
    </div>
    <div id="feedback">
        <p id="text"></p>
    </div>

    <script>
        var i = 0;

        var option1 = document.getElementById("firstOption");
        var option2 = document.getElementById("secondOption");
        var option3 = document.getElementById("thirdOption");

        var numberOnFirst = [6, 5, 2, 3];
        var numberOnSecond = [6, 9, 7, 2];
        var options = [[12, 10, 14], [14, 17, 12], [8, 10, 9], [4, 8, 5]];
        var answers = [0, 0, 2, 2];

        var firstNumber = document.getElementById("firstNumber");
        var secondNumber = document.getElementById("secondNumber");
        var result = document.getElementById("result");

        var feedbackText = document.getElementById("text");

        function loadQuestion() {
            if (i < answers.length) {
                firstNumber.textContent = numberOnFirst[i];
                secondNumber.textContent = numberOnSecond[i];
                result.textContent = "?";

                option1.textContent = options[i][0];
                option2.textContent = options[i][1];
                option3.textContent = options[i][2];

                option1.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                option2.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                option3.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                
                feedbackText.textContent = "";
            } else {
                feedbackText.textContent = "🎉 Parabéns! Você completou todas as questões!";
                result.textContent = "✓";
                
                
                option1.disabled = true;
                option2.disabled = true;
                option3.disabled = true;
            }
        }

        function checkResult(index) {
            if (index != answers[i]) {
                feedbackText.textContent = "❌ Tente de novo!";
                
                if (index === 0) option1.style.background = "linear-gradient(145deg, #ff6b6b, #ff5252)";
                if (index === 1) option2.style.background = "linear-gradient(145deg, #ff6b6b, #ff5252)";
                if (index === 2) option3.style.background = "linear-gradient(145deg, #ff6b6b, #ff5252)";
                
                // Volta ao normal após 500ms
                setTimeout(() => {
                    if (index === 0) option1.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                    if (index === 1) option2.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                    if (index === 2) option3.style.background = "linear-gradient(145deg, #ffd93d, #ffb347)";
                    feedbackText.textContent = "";
                }, 500);
            } else {
                feedbackText.textContent = "✅ Correto!";
                result.textContent = options[i][answers[i]];
                
                if (answers[i] === 0) option1.style.background = "linear-gradient(145deg, #4CAF50, #45a049)";
                if (answers[i] === 1) option2.style.background = "linear-gradient(145deg, #4CAF50, #45a049)";
                if (answers[i] === 2) option3.style.background = "linear-gradient(145deg, #4CAF50, #45a049)";
                
                setTimeout(() => {
                    i++;
                    loadQuestion();
                }, 1000);
            }
        }

        option1.onclick = function () {
            checkResult(0);
        }
        
        option2.onclick = function () {
            checkResult(1);
        }
        
        option3.onclick = function () {
            checkResult(2);
        }

        // Carrega a primeira questão
        loadQuestion();
    </script>
</body>

</html>
